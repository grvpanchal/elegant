@if (isLoading) {
  <button [class]="computedClasses" [disabled]="isLoading">
    <app-loader width="2px" size="1.2rem" color="#fff"></app-loader>
  </button>
} @else {
  <button [type]="type || 'button'" (click)="onClick.emit($event)" [class]="computedClasses">
    <ng-content></ng-content>
  </button>
}
