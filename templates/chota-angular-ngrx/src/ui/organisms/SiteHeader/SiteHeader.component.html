<div class="header">
  <div class="header-block">
    <div>
      <h1>{{ headerData.brandName }}</h1>
    </div>
    <div>
      <h1
        role="button"
        (click)="events.onThemeChangeClick()"
        class="text-right pointer"
      >
        {{ headerData.theme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19' }}
      </h1>
    </div>
  </div>
</div>
